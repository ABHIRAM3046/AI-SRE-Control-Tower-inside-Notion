name: Redeploy Service

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: Service/deployment name to restart
        required: true
        type: string
      recommended_fix:
        description: AI recommended remediation (for audit)
        required: false
        type: string
      severity:
        description: Incident severity
        required: true
        type: string
      notion_page_id:
        description: Notion page ID for the incident row
        required: false
        type: string

permissions:
  contents: read

jobs:
  redeploy:
    runs-on: ubuntu-latest
    env:
      KUBE_NAMESPACE: ${{ vars.KUBE_NAMESPACE || 'default' }}
      KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}

    steps:
      - name: Log incident context
        run: |
          echo "Service: ${{ github.event.inputs.service_name }}"
          echo "Severity: ${{ github.event.inputs.severity }}"
          echo "Recommended Fix: ${{ github.event.inputs.recommended_fix }}"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig from secret
        if: ${{ env.KUBE_CONFIG_DATA != '' }}
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${KUBE_CONFIG_DATA}" | base64 -d > "$HOME/.kube/config"

      - name: Rollout restart deployment
        if: ${{ env.KUBE_CONFIG_DATA != '' }}
        run: |
          kubectl rollout restart deployment/${{ github.event.inputs.service_name }} -n "$KUBE_NAMESPACE"
          kubectl rollout status deployment/${{ github.event.inputs.service_name }} -n "$KUBE_NAMESPACE" --timeout=180s

      - name: Trigger Notion incident resolve workflow
        if: ${{ success() && github.event.inputs.notion_page_id != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'incident_resolve',
              client_payload: {
                notion_page_id: '${{ github.event.inputs.notion_page_id }}',
                service_name: '${{ github.event.inputs.service_name }}',
                severity: '${{ github.event.inputs.severity }}',
                recommended_fix: '${{ github.event.inputs.recommended_fix }}'
              }
            });

      - name: Dry-run note when kube secret missing
        if: ${{ env.KUBE_CONFIG_DATA == '' }}
        run: |
          echo "KUBE_CONFIG_DATA secret is not set."
          echo "Workflow received incident trigger and ran in dry-run mode."
